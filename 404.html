<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Signal Lost | SmartDeskDojo</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --surface: #18181b; --text: #f4f4f5; --subtext: #d4d4d8; --accent1: #00f2fe; --accent2: #4facfe; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 5em; margin: 0; background: -webkit-linear-gradient(0deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--subtext); font-size: 1.2em; max-width: 600px; margin: 20px auto 40px; }
        .btn { display: inline-block; background: linear-gradient(90deg, var(--accent1), var(--accent2)); color: black; padding: 15px 30px; text-decoration: none; border-radius: 4px; font-weight: 800; font-family: 'Montserrat', sans-serif; font-size: 1.1em; text-transform: uppercase; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
    </style>
</head>
<body>
    <h1>404: CONNECTION LOST</h1>
    <p>The hardware specs you are transmitting cannot be found in our database. The page may have been relocated or deleted.</p>
    <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
        <a href="/index.html" class="btn" style="background: transparent; color: white; border: 2px solid var(--accent1);">RETURN TO HQ</a>
        <a href="/calculator.html" class="btn">LAUNCH ERGONOMIC CALCULATOR</a>
    </div>
</body>
</html>
